server:
  port: 8080
spring:
  application:
    name: jiuyang-system
  datasource:
    dynamic:
      primary: master
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.202.21:8848
      config:
        server-addr: 192.168.202.21:8848
        file-extension: yml
        shared-configs:
          - application-${spring.profiles.active}.${spring.cloud.nacos.config.file-extension}
        namespace: public
        group: DEFAULT_GROUP
    loadbalancer:
      nacos:
        enabled: true
  config:
    import:
      - nacos:jiuyang-system-dev.yml?refreshEnabled=true
logging:
  file:
    path: ${LOG_HOME}\\${spring.application.name}
  config: classpath:log4j2-spring-${spring.profiles.active}.xml