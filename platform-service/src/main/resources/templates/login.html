<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <!-- 国际化：标题 -->
    <title th:text="#{login.pageTitle}"></title>
    <link rel="icon" href="/platformSvr/assets/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="/platformSvr/assets/favicon.ico" type="image/x-icon">
    <link rel="icon" sizes="16x16 32x32 48x48" href="/platformSvr/assets/favicon.ico">
    <script src="/platformSvr/assets/tailwind.js"></script>
    <style>
        body {
            margin: 0;
            background: url("/platformSvr/assets/login-background.svg") center center / cover no-repeat;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: max(5vw, 40px);
            padding-left: max(2vw, 16px);
            min-height: 100vh;
        }

        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 131, 81, 0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 131, 81, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
            opacity: 0.8;
        }

        .glass-card {
            background: rgba(255, 255, 255, 100);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 131, 81, 0.3);
            box-shadow: 0 0 20px rgba(0, 131, 81, 0.15);
            width: 100%;
            max-width: 300px;
            min-width: 250px;
            padding: clamp(1.5rem, 4vw, 2rem);
            border-radius: 2xl;
            opacity: 0.81;
        }

        .theme-bg {
            background-color: #008351;
        }

        .theme-bg-hover:hover {
            background-color: #006c43;
        }

        .theme-text {
            color: #000000;
        }

        .theme-border {
            border-color: #008351;
        }

        .theme-shadow {
            box-shadow: 0 0 15px rgba(0, 131, 81, 0.4);
        }

        .theme-glow {
        }

        .captcha-size {
            max-height: 62px;
        }

        .error-captcha {
            border-left: 4px solid #f59e0b;
            animation: pulse-captcha 2s infinite;
        }

        .error-credentials {
            border-left: 4px solid #ef4444;
            animation: pulse-credentials 2s infinite;
        }

        @keyframes pulse-captcha {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4);
            }
            50% {
                box-shadow: 0 0 0 4px rgba(245, 158, 11, 0);
            }
        }

        @keyframes pulse-credentials {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
            }
            50% {
                box-shadow: 0 0 0 4px rgba(239, 68, 68, 0);
            }
        }

        @keyframes shake {
            0%, 100% {
                transform: translateX(0);
            }
            10%, 30%, 50%, 70%, 90% {
                transform: translateX(-2px);
            }
            20%, 40%, 60%, 80% {
                transform: translateX(2px);
            }
        }

        .animate-shake {
            animation: shake 0.5s ease-in-out;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        ::-webkit-scrollbar-thumb {
            background: #008351;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #006c43;
        }

        @media (max-width: 768px) {
            body {
                padding-right: 2vw;
                padding-left: 2vw;
            }

            .glass-card {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
<div class="matrix-bg"></div>

<div class="glass-card p-8 rounded-2xl w-full max-w-sm">
    <div class="text-center mb-10">
        <img src="/platformSvr/assets/logo.png" alt="logo"
             class="w-auto h-[80px] max-w-[280px] mx-auto mb-2">
<!--        Current Locale: <span th:text="${#locale}"></span><br/>-->
    </div>

    <form th:action="@{/login}" method="post" class="space-y-6">
        <div>
            <label class="block text-dark text-xs mb-2 uppercase font-medium" th:text="#{login.username}">登录账号</label>
            <input type="text" name="username" required
                   class="w-full bg-white/30 border border-[#004d32] rounded-lg px-4 py-3 theme-text
                          focus:outline-none focus:border-[#008351] focus:ring-1 focus:ring-[#008351]
                          transition-all placeholder:text-[#b6b2b2]"
                   oninput="this.value = this.value.replace(/[^a-zA-Z0-9@.]/g, '')"
                   th:placeholder="#{login.placeholder.username}">
        </div>

        <div>
            <label class="block text-dark text-xs mb-2 uppercase font-medium" th:text="#{login.password}">登录密码</label>
            <input type="password" name="password" required
                   class="w-full bg-white/30 border border-[#004d32] rounded-lg px-4 py-3 theme-text
                          focus:outline-none focus:border-[#008351] focus:ring-1 focus:ring-[#008351]
                          transition-all placeholder:text-[#b6b2b2]"
                   th:placeholder="#{login.placeholder.password}"
                   oninput="value=value.replace(/[\u4e00-\u9fa5]/g,'')">
        </div>

        <div>
            <label class="block text-dark text-xs mb-2 uppercase font-medium" th:text="#{login.captcha}">验证码</label>
            <div class="grid grid-cols-2 gap-4">
                <input type="text" name="captcha" required maxlength="4"
                       class="bg-white/30 border border-[#004d32] rounded-lg px-4 py-2 theme-text focus:outline-none focus:border-[#008351] focus:ring-1 focus:ring-[#008351] transition-all placeholder:text-[#b6b2b2]"
                       th:placeholder="#{login.placeholder.captcha}"
                       oninput="this.value = this.value.replace(/[^a-zA-Z0-9]/g, '')">
                <img th:src="@{/papi/captcha/generate}"
                     onclick="this.src='/platformSvr/papi/captcha/generate?'+Math.random()"
                     class="w-full h-full min-h-[45px] captcha-size object-cover rounded-lg cursor-pointer
                        border border-[#004d32] hover:opacity-90 hover:border-[#008351]
                        transition-all duration-300 md:min-h-[50px] sm:min-h-[40px]"
                     th:title="#{login.clickRefresh}">
            </div>
        </div>

        <button type="submit"
                class="w-full theme-bg hover:theme-bg-hover text-white font-bold py-3 rounded-lg
                       theme-shadow transition-all duration-300 transform hover:scale-[1.02]
                       active:scale-[0.98]">
            <span th:text="#{login.btnLogin}"></span>
        </button>

        <div th:if="${param.error != null and param.error[0] == 'captcha'}"
             class="text-[#ef4444] text-sm text-center error-credentials bg-[#004d32]/10 py-3 px-4 rounded">
            <div class="flex items-center justify-center space-x-2">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd"
                          d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"/>
                </svg>
                <span th:text="#{login.errorCaptcha}">验证码校验失败</span>
            </div>
            <p class="text-xs mt-1 text-[#ef4444]" th:text="#{login.errorCaptchaDesc}"></p>
        </div>

        <div th:if="${param.error != null and param.error[0] != 'captcha'}"
             class="text-[#ef4444] text-sm text-center error-credentials bg-[#004d32]/10 py-3 px-4 rounded">
            <div class="flex items-center justify-center space-x-2">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd"
                          d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"/>
                </svg>
                <span th:text="#{login.errorCredentials}">账号密码错误</span>
            </div>
            <p class="text-xs mt-1 text-[#ef4444]/80" th:text="#{login.errorCredentialsDesc}"></p>
        </div>
    </form>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', function () {
                this.parentElement.classList.add('opacity-100');
            });
            input.addEventListener('blur', function () {
                this.parentElement.classList.remove('opacity-100');
            });
            input.addEventListener('input', function () {
                if (this.value.length > 0) {
                    this.classList.add('border-[#008351]');
                } else {
                    this.classList.remove('border-[#008351]');
                }
            });
        });

        const submitBtn = document.querySelector('button[type="submit"]');
        submitBtn.addEventListener('click', function (e) {
            if (!document.querySelector('form').checkValidity()) {
                this.classList.add('animate-shake');
                setTimeout(() => {
                    this.classList.remove('animate-shake');
                }, 500);
            }
        });

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('error') === 'captcha') {
            const captchaImg = document.querySelector('img[onclick]');
            if (captchaImg) {
                setTimeout(() => {
                    captchaImg.click();
                }, 300);
            }
        }

        const langFromUrl = urlParams.get('lang');
        // 如果URL中有lang参数，就保存到localStorage
        if (langFromUrl) {
            localStorage.setItem('lang', langFromUrl);
            // 可选：控制台打印，方便调试
            console.log('已自动设置语言到localStorage:', langFromUrl);
        } else {
            const lang = navigator.language;
            localStorage.setItem('lang', lang.replace('-', '_'));
        }
    });
</script>
</body>
</html>
