spring:
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
#    cloud:
#      inetutils:
#        preferred-networks: 10.0.2
# feign 配置
feign:
  sentinel:
    enabled: false
  okhttp:
    enabled: true
  httpclient:
    enabled: false
  client:
    config:
      default:
        connectTimeout: 10000
        readTimeout: 10000
  compression:
    request:
      enabled: true
    response:
      enabled: true

# 暴露监控端点
management:
  endpoints:
    web:
      exposure:
        include: '*'